<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>案件登録</title>

  <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-4">

  <h1>案件登録</h1>

  <form th:action="@{/deals}" th:object="${deal}" method="post">

    <input type="hidden" th:field="*{customer.id}">

    <div class="mb-3">

      <label class="form-label">案件名</label>

      <input type="text"
             class="form-control"
             th:field="*{title}">

    </div>

    <div class="mb-3">

      <label class="form-label">金額</label>

      <input type="number"
             class="form-control"
             th:field="*{amount}">

    </div>

    <div class="mb-3">

      <label class="form-label">ステータス</label>

      <select class="form-control"
              th:field="*{status}">

        <option value="提案中">提案中</option>
        <option value="交渉中">交渉中</option>
        <option value="受注">受注</option>
        <option value="失注">失注</option>

      </select>

    </div>

    <button type="submit" class="btn btn-primary">

      保存

    </button>

  </form>

</div>

</body>
</html>
