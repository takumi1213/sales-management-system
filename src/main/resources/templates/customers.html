<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>顧客一覧</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

  <h1 class="mb-4">顧客一覧</h1>

  <a href="/customers/new" class="btn btn-success mb-3">
    ＋ 顧客登録
  </a>

  <div class="row">

    <div class="col-md-4 mb-3" th:each="customer : ${customers}">

      <div class="card shadow-sm">

        <div class="card-body">

          <h5 th:text="${customer.name}"></h5>

          <p class="text-muted" th:text="${customer.company}"></p>

          <a th:href="@{/customers/{id}(id=${customer.id})}"
             class="btn btn-primary btn-sm">
            詳細
          </a>
          <a th:href="@{/customers/edit/{id}(id=${customer.id})}"
             class="btn btn-warning btn-sm">
            編集
          </a>

          <a th:href="@{/customers/delete/{id}(id=${customer.id})}"
             class="btn btn-danger btn-sm"
             onclick="return confirm('削除してもよろしいですか？');">
            削除
          </a>
        </div>

      </div>

    </div>

  </div>

</div>

</body>
</html>
