<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>案件詳細</title>

  <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-4">

  <h1 th:text="${deal.title}"></h1>

  <p>
    金額: <span th:text="${deal.amount}"></span>
  </p>

  <p>
    ステータス: <span th:text="${deal.status}"></span>
  </p>

  <div class="mb-3">
    <a th:href="@{/deals/{id}/memos/new(id=${deal.id})}"
       class="btn btn-warning">

      商談メモ追加

    </a>
  </div>

  <hr>

  <h2>商談メモ</h2>

  <table class="table table-striped">

    <tr>
      <th>ID</th>
      <th>内容</th>
      <th>作成日</th>
    </tr>

    <tr th:each="memo : ${deal.memos}">

      <td th:text="${memo.id}"></td>

      <td th:text="${memo.content}"></td>

      <td th:text="${memo.createdAt}"></td>

    </tr>

  </table>

  <a href="/customers" class="btn btn-secondary mt-3">
    顧客一覧へ戻る
  </a>

</div>

</body>
</html>
