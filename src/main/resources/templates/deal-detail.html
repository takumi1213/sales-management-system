<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>案件詳細</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

  <div class="card shadow p-4 mb-4">

    <h2 th:text="${deal.title}"></h2>

    <p>金額: <strong th:text="${deal.amount}"></strong></p>

    <p>
      <span class="badge bg-success"
            th:text="${deal.status}"></span>
    </p>

    <div class="mt-3">
      <a th:href="@{/deals/{id}/memos/new(id=${deal.id})}"
         class="btn btn-warning">
        ＋ メモ追加
      </a>

      <a th:href="@{/customers/{id}(id=${deal.customer.id})}"
         class="btn btn-secondary ms-2">
        ← 顧客へ戻る
      </a>
    </div>

  </div>

  <h4>商談メモ</h4>

  <div class="card p-3 mb-2 shadow-sm"
       th:each="memo : ${deal.memos}">

    <p th:text="${memo.content}"></p>

    <small class="text-muted"
           th:text="${memo.createdAt}"></small>
  </div>

</div>

</body>
</html>
