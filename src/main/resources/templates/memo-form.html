<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>商談メモ登録</title>
  <meta charset="UTF-8">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="card shadow p-4">

    <h2 class="mb-4">商談メモ登録</h2>

    <!-- 🔥 フォーム -->
    <form th:action="@{/memos}" th:object="${memo}" method="post">

      <!-- 🔥 Dealとの紐付け（超重要） -->
      <input type="hidden" th:field="*{deal.id}">

      <!-- メモ内容 -->
      <div class="mb-3">
        <label class="form-label">メモ内容</label>
        <textarea class="form-control"
                  rows="5"
                  th:field="*{content}"
                  placeholder="商談内容を入力..."></textarea>
      </div>

      <!-- ボタン -->
      <div class="mt-3">

        <button type="submit" class="btn btn-primary">
          保存
        </button>

        <!-- 🔥 戻るボタン（重要） -->
        <a th:href="@{/deals/{id}(id=${memo.deal.id})}"
           class="btn btn-secondary ms-2">
          ← 戻る
        </a>

      </div>

    </form>

  </div>

</div>

</body>
</html>
