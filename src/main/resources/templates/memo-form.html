<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>商談メモ登録</title>

  <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-4">

  <h1>商談メモ登録</h1>

  <form th:action="@{/memos}" th:object="${memo}" method="post">

    <input type="hidden" th:field="*{deal.id}">

    <div class="mb-3">

      <label class="form-label">メモ内容</label>

      <textarea
          class="form-control"
          rows="5"
          th:field="*{content}">
</textarea>

    </div>

    <button type="submit" class="btn btn-primary">

      保存

    </button>

  </form>

</div>

</body>
</html>
