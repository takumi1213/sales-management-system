<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>顧客詳細</title>

  <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-4">

  <h1>顧客詳細</h1>

  <h3 th:text="${customer.name}"></h3>

  <p>
    会社: <span th:text="${customer.company}"></span>
  </p>

  <p>
    Email: <span th:text="${customer.email}"></span>
  </p>

  <hr>

  <div class="mb-3">

    <a th:href="@{/customers/{id}/deals/new(id=${customer.id})}"
       class="btn btn-success">

      案件登録

    </a>

    <a href="/customers"
       class="btn btn-secondary">

      顧客一覧へ戻る

    </a>

  </div>

  <h2>案件一覧</h2>

  <table class="table table-striped">

    <tr>
      <th>ID</th>
      <th>案件名</th>
      <th>金額</th>
      <th>ステータス</th>
      <th>詳細</th>
    </tr>

    <tr th:each="deal : ${customer.deals}">

      <td th:text="${deal.id}"></td>

      <td th:text="${deal.title}"></td>

      <td th:text="${deal.amount}"></td>

      <td th:text="${deal.status}"></td>

      <!-- 🔥 ここが超重要 -->
      <td>
        <a th:href="@{/deals/{id}(id=${deal.id})}"
           class="btn btn-primary btn-sm">

          詳細

        </a>
      </td>

    </tr>

  </table>

</div>

</body>
</html>
