<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>顧客詳細</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

  <h1>顧客詳細</h1>

  <p><strong>名前:</strong> <span th:text="${customer.name}"></span></p>
  <p><strong>会社:</strong> <span th:text="${customer.company}"></span></p>
  <p><strong>Email:</strong> <span th:text="${customer.email}"></span></p>

  <hr>

  <!--  正しい案件登録 -->
  <a th:href="@{/customers/{id}/deals/new(id=${customer.id})}"
     class="btn btn-success mb-3">
    ＋ 案件登録
  </a>

  <h2>案件一覧</h2>

  <table class="table table-striped">
    <thead>
    <tr>
      <th>ID</th>
      <th>案件名</th>
      <th>金額</th>
      <th>ステータス</th>
    </tr>
    </thead>

    <tbody>
    <!--  正しい参照 -->
    <tr th:each="deal : ${customer.deals}">
      <td th:text="${deal.id}"></td>

      <!--  詳細に飛べる -->
      <td>
        <a th:href="@{/deals/{id}(id=${deal.id})}"
           th:text="${deal.title}">
        </a>
      </td>

      <td th:text="${deal.amount}"></td>
      <td th:text="${deal.status}"></td>
    </tr>
    </tbody>
  </table>

  <a href="/customers" class="btn btn-secondary">← 戻る</a>

</div>

</body>
</html>
